<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="stylesheet" href="styleslogin.css" />
  <title>Login</title>
</head>
<body>

  <div class="container">
    <h2>Entrar</h2>

    <!-- PASSO 1: email + senha -->
    <div id="login-form">
      <div class="input-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="Digite seu email">
      </div>

      <div class="input-group">
        <label>Senha</label>
        <input type="password" id="senha" placeholder="Digite sua senha">
      </div>

      <button onclick="login()">Entrar</button>

      <div class="cadastro-link">
        Não possui conta?
        <a href="cadastro.html">Cadastrar</a>
      </div>
    </div>

    <!-- PASSO 2: código 2FA (oculto até o login ser validado) -->
    <div id="form-2fa" style="display:none;">
      <p style="color:#555; margin-bottom:20px; text-align:center;">
        📧 Um código foi enviado para seu email.<br>Digite abaixo para continuar.
      </p>

      <div class="input-group">
        <label>Código de verificação</label>
        <input type="text" id="codigo-2fa" placeholder="000000" maxlength="6"
               style="font-size:24px; letter-spacing:8px; text-align:center;">
      </div>

      <button onclick="verificar2fa()">Verificar</button>

      <div class="cadastro-link">
        <a href="#" onclick="location.reload()">Voltar ao login</a>
      </div>
    </div>
  </div>

  <script src="script.js"></script>

</body>
</html>
