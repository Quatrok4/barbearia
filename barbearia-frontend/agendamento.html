<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styleagendamento.css">
  <title>Agendamento - Barbearia</title>
</head>
<body>

  <div class="container">

    <div class="topo">
      <div class="logo-area">
        <h1>✂ Barbearia Prime</h1>
        <p>Sistema de agendamento online</p>
      </div>

      <div class="perfil">
        <span id="perfil-nome">👤 Carregando...</span>
        &nbsp;|&nbsp;
        <a href="#" onclick="logout()" style="color:#c59d5f; text-decoration:none; font-weight:bold;">Sair</a>
      </div>
    </div>

    <div class="cards">

      <!-- FORMULÁRIO -->
      <div class="card">
        <h2>Novo Agendamento</h2>

        <div class="input-group">
          <label>Serviço</label>
          <select id="servico">
            <option>Corte Degradê</option>
            <option>Corte Social</option>
            <option>Barba</option>
            <option>Corte + Barba</option>
            <option>Sobrancelha</option>
          </select>
        </div>

        <div class="input-group">
          <label>Barbeiro</label>
          <select id="barbeiro">
            <option>João</option>
            <option>Marcos</option>
            <option>Felipe</option>
          </select>
        </div>

        <div class="input-group">
          <label>Data</label>
          <input type="date" id="data" onchange="carregarAgendamentos()">
        </div>

        <div class="input-group">
          <label>Horário</label>
          <input type="time" id="horario">
        </div>

        <button onclick="agendar()">Confirmar Agendamento</button>
      </div>

      <!-- AGENDAMENTOS -->
      <div class="card">
        <h2>Horários Ocupados</h2>
        <div id="lista-agendamentos">
          <p style="color:#bdbdbd">Selecione uma data para ver os horários ocupados.</p>
        </div>
      </div>

    </div>

  </div>

  <script src="script.js"></script>

</body>
</html>
